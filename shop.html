<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חנות | סטודיו שלם</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/LOGO1.png">
</head>
<body>

  <nav class="navbar" id="navbar" style="background: rgba(250, 247, 242, 0.95); box-shadow: 0 1px 30px rgba(44, 36, 24, 0.08);">
    <div class="nav-logo">
      <img src="images/LOGO1.png" alt="סטודיו שלם לוגו">
      <span class="nav-logo-text" style="color: var(--clay-dark);">סטודיו שלם</span>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" style="color: var(--charcoal);">ראשי</a></li>
      <li><a href="shop.html" style="color: var(--terracotta); font-weight: bold;">חנות</a></li>
      <li><a href="workshop.html" style="color: var(--charcoal);">סדנאות</a></li>
      <li><a href="index.html#contact" class="nav-cta">צרו קשר</a></li>
    </ul>
    <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
      <span style="background: var(--charcoal);"></span>
      <span style="background: var(--charcoal);"></span>
      <span style="background: var(--charcoal);"></span>
    </div>
  </nav>

  <div style="height: 100px;"></div>

  <section class="gallery-section" id="products">
    <div class="section-header">
      <div class="logo-container">
        <img src="images/LOGO1.png" class="studio-logo" alt="סטודיו שלם">
      </div>
      <div class="section-tag reveal">חנות</div>
      <h2 class="section-title reveal reveal-delay-1">הכלים שלי</h2>
      <div class="section-line reveal reveal-delay-2"></div>
    </div>

    <div class="gallery-wrapper">
      <div id="gallery"></div>
      <button class="slider-btn slider-prev" id="sliderPrev" aria-label="הקודם">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="slider-btn slider-next" id="sliderNext" aria-label="הבא">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="slider-dots" id="sliderDots"></div>
    <div class="slider-counter" id="sliderCounter"></div>
  </section>

  <footer class="site-footer">
    <img src="images/LOGO1.png" class="footer-logo" alt="סטודיו שלם">
    <p>סטודיו שלם · קרמיקה בעבודת יד · מורשת, משגב</p>
    <p style="margin-top:12px; font-size:12px; opacity:0.5;">© 2026 כל הזכויות שמורות</p>
  </footer>

  <a id="whatsappBtn" href="https://wa.me/972507666901" target="_blank">
    <img src="images/whatsapp.svg" alt="WhatsApp">
    <div class="whatsapp-text">לפרטים לחצו כאן</div>
  </a>

  <button id="adminBtn" onclick="adminLogin()">A</button>
  <button id="addBtn" onclick="showAddForm()">+</button>
  <button id="discountBtn" onclick="setGlobalDiscount()">%</button>
  
  <div id="modal" class="modal">
    <div class="modal-card">
      <span id="close">✕</span>
      <img id="modal-img">
      <h2 id="modal-name"></h2>
      <p id="modal-desc"></p>
      <h3 id="modal-price"></h3>
      <div id="modal-stock"></div>
      <div id="adminArea"></div>
    </div>
  </div>

  <div id="addForm">
    <h3>הוספת מוצר</h3>
    <input id="newName" placeholder="שם מוצר">
    <input id="newPrice" type="number" placeholder="מחיר">
    <textarea id="newDesc" placeholder="תיאור"></textarea>
    <input type="file" id="newImage" accept="image/*">
    <button onclick="saveNewProduct()">שמור מוצר</button>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCqi32tyPHflqnqvTZfBPf_SPqQdvKrq_A",
    authDomain:"studioshalem-ba925.firebaseapp.com",
    projectId:"studioshalem-ba925"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let adminMode = false;
  let products = [];
  let globalDiscount = 0;
  let imageIndex = 0;
  let imageList = [];
  
  let modal = document.getElementById("modal");
  let modalImg = document.getElementById("modal-img");
  let modalName = document.getElementById("modal-name");
  let modalDesc = document.getElementById("modal-desc");
  let modalPrice = document.getElementById("modal-price");
  let modalStock = document.getElementById("modal-stock");
  let adminArea = document.getElementById("adminArea");

// פונקציה לסגירת החלונית
  function closeModal() {
    modal.style.display = "none"; 
    document.body.classList.remove("modal-open");
  }

  // סגירה בלחיצה על ה-X
  document.getElementById("close").onclick = closeModal;

  // 🟢 הקסם: סגירה בלחיצה על הרקע הכהה מסביב לחלונית 🟢
  window.addEventListener("click", function(event) {
    if (event.target === modal) {
      closeModal();
    }
  });
  async function loadProducts() {
    try {
      const settingsDoc = await getDoc(doc(db, "settings", "store"));
      if (settingsDoc.exists()) globalDiscount = settingsDoc.data().discount || 0;
    } catch (e) {}

    const snapshot = await getDocs(collection(db, "products"));
    products = [];
    let html = "";

    snapshot.forEach(docSnap => {
      let p = docSnap.data();
      p.id = docSnap.id;
      products.push(p);

      let status = p.stock ? "במלאי" : "אזל";
      let className = p.stock ? "instock" : "outstock";

      let priceHtml = `<div class="price">₪${p.price}</div>`;
      if (globalDiscount > 0) {
        let discountedPrice = Math.floor(p.price * (1 - (globalDiscount / 100)));
        priceHtml = `<div class="price-container"><span class="price-original">₪${p.price}</span><span class="price">₪${discountedPrice}</span></div>`;
      }

      html += `
        <div class="product" ${adminMode ? `onclick="openProduct('${p.id}')"` : ""}>
          <img src="${p.image}" alt="כלי לסטודיו">
          <div class="product-info">
            <div class="name">${p.name}</div>
            <div class="description">${p.description}</div>
            ${priceHtml}
            <div class="status ${className}">${status}</div>
          </div>
        </div>
      `;
    });
    document.getElementById("gallery").innerHTML = html;
    // סידור הגלריה מחדש מיד אחרי טעינת הכלים
    if (typeof initSlider === "function") {
      setTimeout(initSlider, 100);
    }
  }

  window.openProduct = function(id) {
    let p = products.find(x => x.id === id);
    modal.style.display = "flex";
    document.body.classList.add("modal-open");

    let baseImage = p.image;
    imageList = [baseImage];
    let second = baseImage.replace(".jpeg", "_2.jpeg");
    let third = baseImage.replace(".jpeg", "_3.jpeg");
    imageList.push(second); imageList.push(third);
    imageIndex = 0;

    modalImg.src = imageList[imageIndex];
    modalImg.onclick = () => {
      imageIndex++;
      if (imageIndex >= imageList.length) imageIndex = 0;
      modalImg.src = imageList[imageIndex];
    };
    
    modalStock.innerText = p.stock ? "במלאי" : "אזל";
    modalName.innerHTML = `<input id="editName" value="${p.name}">`;
    modalDesc.innerHTML = `<textarea id="editDesc">${p.description}</textarea>`;
    modalPrice.innerHTML = `<input id="editPrice" type="number" value="${p.price}">`;

    adminArea.innerHTML = `
      <button onclick="saveChanges('${id}')">שמור</button>
      <button onclick="toggleStock('${id}')">שנה מלאי</button>
      <button onclick="changeImage('${id}')">שנה תמונה</button>
      <button onclick="deleteProduct('${id}')">מחק מוצר</button>
    `;
  };

  window.saveChanges = async function(id) {
    let newName = document.getElementById("editName").value;
    let newDesc = document.getElementById("editDesc").value;
    let newPrice = document.getElementById("editPrice").value;
    await updateDoc(doc(db, "products", id), { name: newName, description: newDesc, price: Number(newPrice) });
    alert("נשמר"); loadProducts();
  };

  window.toggleStock = async function(id) {
    let product = products.find(p => p.id === id);
    await updateDoc(doc(db, "products", id), { stock: !product.stock });
    loadProducts();
  };

  window.changeImage = function(id) {
    let input = document.createElement("input");
    input.type = "file"; input.accept = "image/*";
    input.onchange = function() {
      let file = input.files[0];
      let reader = new FileReader();
      reader.onload = function() { updateDoc(doc(db, "products", id), { image: reader.result }).then(() => { alert("התמונה עודכנה"); loadProducts(); }); };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  window.deleteProduct = function(id) {
    if (!confirm("למחוק מוצר?")) return;
    deleteDoc(doc(db, "products", id)).then(() => { alert("המוצר נמחק"); closeModal(); loadProducts(); });
  };

  window.adminLogin = function() {
    let pass = prompt("סיסמת מנהל");
    if (pass === "Hadar7666") {
      adminMode = true; alert("מצב מנהל הופעל");
      document.getElementById("addBtn").style.display = "flex";
      document.getElementById("discountBtn").style.display = "flex";
      loadProducts();
    }
  };

  window.showAddForm = () => document.getElementById("addForm").style.display = "block";

  window.setGlobalDiscount = async function() {
    let pct = prompt("הזני אחוז הנחה לכל האתר (למשל 15, להסרת המבצע הקישי 0):", globalDiscount);
    if (pct === null) return; 
    let discountValue = parseInt(pct);
    if (isNaN(discountValue) || discountValue < 0 || discountValue > 100) { alert("אנא הזיני מספר חוקי בין 0 ל-100"); return; }
    await setDoc(doc(db, "settings", "store"), { discount: discountValue }, { merge: true });
    if (discountValue > 0) alert(`הנחה של ${discountValue}% הופעלה בהצלחה על כל האתר!`);
    else alert("ההנחה הוסרה בהצלחה. המחירים חזרו לקדמותם.");
    loadProducts(); 
  };

  window.saveNewProduct = function() {
    let name = document.getElementById("newName").value;
    let price = document.getElementById("newPrice").value;
    let desc = document.getElementById("newDesc").value;
    let file = document.getElementById("newImage").files[0];
    if(!file) { alert("יש לבחור תמונה"); return; }
    let reader = new FileReader();
    reader.onload = function() {
      addDoc(collection(db, "products"), { name: name, description: desc, price: Number(price), image: reader.result, stock: true })
      .then(() => { alert("המוצר נוסף"); loadProducts(); document.getElementById("addForm").style.display = "none"; });
    };
    reader.readAsDataURL(file);
  };

  // הפעלה ראשונית
  loadProducts();
  
  // אנימציות חשיפה (Reveal)
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
 
 // ═══════════ Product Slider (Mobile) ═══════════
  let currentSlide = 0;
  let totalSlides = 0;
  let isMobileSlider = false;
  let touchStartX = 0;
  let touchEndX = 0;

  function isMobileView() {
    return window.innerWidth <= 700;
  }

  function initSlider() {
    const gallery = document.getElementById('gallery');
    const items = gallery.querySelectorAll('.product');
    totalSlides = items.length;

    if (totalSlides === 0) return;

    if (isMobileView()) {
      isMobileSlider = true;
      gallery.classList.add('slider-mode');
      currentSlide = 0;
      updateSlider();
      buildDots();
      updateCounter();
      showSliderControls(true);
    } else {
      isMobileSlider = false;
      gallery.classList.remove('slider-mode');
      items.forEach(item => {
        item.style.transform = '';
        item.style.opacity = '';
      });
      showSliderControls(false);
    }
  }

  function updateSlider() {
    const gallery = document.getElementById('gallery');
    const items = gallery.querySelectorAll('.product');
    if (items.length === 0) return;

    items.forEach((item, i) => {
      if (i === currentSlide) {
        item.style.opacity = '1';
        item.style.transform = 'translateX(0)';
        item.style.position = 'relative';
        item.style.display = 'flex';
      } else {
        item.style.opacity = '0';
        item.style.position = 'absolute';
        item.style.display = 'none';
      }
    });

    updateDots();
    updateCounter();
  }

  function buildDots() {
    const dotsContainer = document.getElementById('sliderDots');
    dotsContainer.innerHTML = '';
    // אם יש יותר מ-10 כלים, הנקודות יוסתרו והמונה יספיק
    if (totalSlides > 10) {
      dotsContainer.style.display = 'none';
      return;
    }
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('span');
      dot.className = 'slider-dot' + (i === currentSlide ? ' active' : '');
      dot.onclick = () => { currentSlide = i; updateSlider(); };
      dotsContainer.appendChild(dot);
    }
  }

  function updateDots() {
    const dots = document.querySelectorAll('.slider-dot');
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === currentSlide);
    });
  }

  function updateCounter() {
    const counter = document.getElementById('sliderCounter');
    if (totalSlides > 0) {
      counter.textContent = `${currentSlide + 1} / ${totalSlides}`;
    }
  }

  function showSliderControls(show) {
    const prev = document.getElementById('sliderPrev');
    const next = document.getElementById('sliderNext');
    const dots = document.getElementById('sliderDots');
    const counter = document.getElementById('sliderCounter');

    if (prev) prev.style.display = show ? 'flex' : 'none';
    if (next) next.style.display = show ? 'flex' : 'none';
    if (dots) dots.style.display = show ? 'flex' : 'none';
    if (counter) counter.style.display = show ? 'block' : 'none';
  }

  function nextSlide() {
    if (totalSlides === 0) return;
    currentSlide = (currentSlide + 1) % totalSlides;
    updateSlider();
  }

  function prevSlide() {
    if (totalSlides === 0) return;
    currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
    updateSlider();
  }

  // הפעלת החיצים בלחיצה
  document.getElementById('sliderPrev').addEventListener('click', prevSlide);
  document.getElementById('sliderNext').addEventListener('click', nextSlide);

  // תמיכה בהחלקה עם האצבע (Swipe) בנייד
  const galleryEl = document.getElementById('gallery');
  galleryEl.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  galleryEl.addEventListener('touchend', (e) => {
    if (!isMobileSlider) return;
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) prevSlide(); 
      else nextSlide();
    }
  }, { passive: true });

  // סידור מחדש אם מסובבים את הטלפון
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(initSlider, 250);
  });
 </script>
  <script>
    // פתיחה וסגירה של תפריט ההמבורגר במובייל (3 הפסים)
    window.toggleNav = function() {
      document.getElementById('navLinks').classList.toggle('open');
    };
    window.closeNav = function() {
      document.getElementById('navLinks').classList.remove('open');
    };

    // הפעלת התפריט הנפתח תחת "ראשי"
    document.addEventListener('DOMContentLoaded', () => {
      const dropdown = document.getElementById('mainDropdown');
      const dropdownToggle = document.getElementById('mainMenuToggle');
      if (dropdownToggle && dropdown) {
        dropdownToggle.addEventListener('click', function(e) {
          e.preventDefault(); 
          dropdown.classList.toggle('active'); 
        });
        document.addEventListener('click', function(e) {
          if (!dropdown.contains(e.target)) dropdown.classList.remove('active');
        });
      }
    });
  </script>
</body>
</html>
